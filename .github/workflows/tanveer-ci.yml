name: Python Continuous Integration

# Triggers the workflow on any push to the repository
on: [push]

jobs:
  continuous-integration:
    # Runs on a fresh GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository code onto the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install project dependencies, flake8 (linter), and upgrade pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run Linting with flake8 to check code style (PEP 8)
      - name: Run linting with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Step 5: Run your automated unit tests
      - name: Run unit tests with unittest
        run: python -m unittest discover -s . -p "test_*.py" -v